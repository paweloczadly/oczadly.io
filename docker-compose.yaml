services:
  hugo:
    build:
      context: .
      args:
        HUGO_VERSION: 0.147.0
    user: "${UID:-1000}:${GID:-1000}"
    command:
      - server
      - --bind=0.0.0.0
      - --baseURL=http://localhost:1313/
      - --buildDrafts
      - --buildFuture
      - --disableFastRender
      - --renderToMemory
    ports:
      - "1313:1313"
    volumes:
      - .:/src
    init: true
